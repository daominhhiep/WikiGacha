name: Claude Code Review (No App)
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  review:
    # Trigger on PR events OR if someone mentions @claude in a PR comment
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # The prompt handles both automated review and interactive replies
          prompt: |
            If this is a new Pull Request or an update:
              Review the changes and provide feedback as inline suggested edits where possible.
              Focus on code quality, security, and architectural consistency.
            If this is a reply to a comment mentioning @claude:
              Answer the user's question or implement the requested changes directly in the PR.
          claude_args: "--max-turns 20"
