name: Claude Code Review (No App)
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Review
        id: claude
        run: |
          # Use a heredoc to capture the output
          # Note: We use --non-interactive if available or pipe 'yes' if needed
          # For now, let's assume 'claude' can run a single command
          # We use 'script' to trick it into thinking it's a TTY if it complains
          claude --max-turns 5 "Review the changes in this pull request and provide a concise summary of findings." > review.txt
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Post Comment
        run: |
          if [ -f review.txt ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body-file review.txt
          else
            echo "No review file generated."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
