name: Claude Code Review (No App)
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Check API key
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "ANTHROPIC_API_KEY is not set. Skipping review."
            exit 0
          fi

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code@latest

      - name: Run Claude Review
        id: claude
        run: |
          # Increased max-turns to 15 for larger PRs
          # Use a more specific prompt to get a summary
          claude --max-turns 15 "Review the changes in this pull request and provide a concise summary of findings. Focus only on critical bugs, security risks, and architectural concerns. Output your review in Markdown format." > review.txt
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Post Comment
        run: |
          if [ -s review.txt ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body-file review.txt
          else
            echo "No review content generated or Claude failed."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
